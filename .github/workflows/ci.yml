name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Ruff format
        run: ruff format --check

      - name: Ruff lint
        run: ruff check

      - name: Pyright
        run: pyright spotify_dl_cli

      - name: Compile
        run: python -m compileall spotify_dl_cli
